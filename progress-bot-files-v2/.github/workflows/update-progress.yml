name: Update Progress

on:
  push:
    branches: [main]
    paths:
      - 'writeups/**'
      - 'scripts/update_progress.py'
      - '.github/workflows/update-progress.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-progress:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate PROGRESS.md
        run: python scripts/update_progress.py

      - name: Commit updated progress
        run: |
          if git diff --quiet PROGRESS.md; then
            echo "No changes to PROGRESS.md"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PROGRESS.md
          git commit -m "chore: update progress tracker"
          git push
